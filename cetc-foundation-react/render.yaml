services:
  - type: web
    name: cetcf-app
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npm run build && npm --prefix server ci
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: DEV_MODE
        value: "false"
      - key: STRICT_ENV_VALIDATION
        value: "false"
      - key: DB_HOST
        fromDatabase:
          name: cetcf-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cetcf-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: cetcf-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: cetcf-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cetcf-postgres
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        sync: false
      - key: CERT_BASE_URL
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        sync: false
      - key: MSG91_SENDER_ID
        value: CETCFN
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: WHATSAPP_API_KEY
        sync: false
      - key: WHATSAPP_API_URL
        value: https://api.interakt.ai/v1/public/message/
      - key: ADMIN_INITIAL_EMAIL
        sync: false
      - key: ADMIN_INITIAL_PASSWORD
        sync: false

databases:
  - name: cetcf-postgres
    databaseName: cetcf_db
    user: cetcf_user
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
